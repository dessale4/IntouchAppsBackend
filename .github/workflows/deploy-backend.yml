name: Deploy Backend Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build backend jar
        run: mvn clean package -DskipTests

      - name: Create timestamped jar copy
        run: |
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          cp target/IntouchApps.jar target/IntouchApps-${TIMESTAMP}.jar
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare remote staging directory
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "mkdir -p /opt/intouch/releases/backend/current"

      - name: Upload timestamped jar to EC2 staging
        run: |
          scp -i ~/.ssh/id_ed25519 target/IntouchApps-${TIMESTAMP}.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/intouch/releases/backend/current/

      - name: Run backend deploy script
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "bash /opt/intouch/deploy-backend.sh"

      - name: Verify backend container is running
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "docker ps | grep intouch-apps-container"

